site_name: GEIDA Foundation Training — Batch 1
site_url: https://geida-edu.terrawatch.net
site_description: >-
  IsDB GEIDA Foundation Level Certification Training, 6–9 July 2026.
  Hybrid: IsDB HQ Jeddah + Online. Session recordings, slide decks, and
  resources for self-paced learning.
site_author: IsDB GEIDA Programme
copyright: "IsDB GEIDA Foundation Training · Batch 1 · July 2026, Developed by Terra, Expo City Dubai"

theme:
  name: material
  logo: assets/Islamic_Development_Bank_logo.png
  favicon: assets/Islamic_Development_Bank_logo.png
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle: {icon: material/brightness-7, name: Switch to dark mode}
    - scheme: slate
      primary: blue
      accent: light blue
      toggle: {icon: material/brightness-4, name: Switch to light mode}
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - content.tooltips

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:

nav:
  - Home: index.md
  - Training Agenda: agenda.md
  - Day 1 — Module 1:
    - day-1/index.md
    - Morning — Why EO Matters & Fundamentals: day-1/morning.md
    - Afternoon — Mainstreaming EO & Exercise 1: day-1/afternoon.md
  - Day 2 — Modules 2 & 3:
    - day-2/index.md
    - Morning — Spatializing IsDB Projects (PCN–PCR): day-2/morning.md
    - Afternoon — GEIDA Opening & WaPOR: day-2/afternoon.md
  - Day 3 — Module 4:
    - day-3/index.md
    - Morning — Spatial Analysis & Use Cases: day-3/morning.md
    - Afternoon — GeoLibre & Case Studies: day-3/afternoon.md
  - Day 4 — Module 5:
    - day-4/index.md
    - Morning — Case Studies 1 & 2: day-4/morning.md
    - Afternoon — Group Presentations & Closing: day-4/afternoon.md
  - Resources:
    - resources/index.md
    - Data Sources: resources/data-sources.md
    - Online GIS Tools: resources/tools.md
    - Video Tutorials: resources/tutorials.md
  - Glossary: glossary.md
